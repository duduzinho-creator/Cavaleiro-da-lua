<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cavaleiro da Lua</title>
    <style>
        /* CSS - O Desafio Hardcore */
        body {
            background-color: #0a0e14; /* Cor de fundo escura */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Alterar fonte */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        h1 {
            color: #ffffff;
            text-align: center; /* Centralizar texto */
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #fff;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin: 20px 0;
            border: 2px solid #333;
        }

        ul {
            text-align: left;
            display: inline-block;
        }

        /* Botão com Hover */
        .btn-moon {
            display: inline-block;
            padding: 15px 30px;
            margin-top: 20px;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-moon:hover {
            background-color: #3498db;
            color: white;
            box-shadow: 0 0 20px #3498db;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cavaleiro da Lua</h1>
        
        <p>Marc Spector é um mercenário com transtorno dissociativo de identidade que se torna o avatar do deus egípcio Khonshu.</p>
        
        <img src="https://image.api.playstation.com" alt="Cavaleiro da Lua sob o luar">

        <h3>Personalidades:</h3>
        <ul>
            <li>Marc Spector (Mercenário)</li>
            <li>Steven Grant (O pacato funcionário)</li>
            <li>Jake Lockley (A personalidade sombria)</li>
        </ul>

        <br>
        <a href="https://www.marvel.com" target="_blank" class="btn-moon">Ver Perfil na Marvel</a>
    </div>

</body>
</html>
